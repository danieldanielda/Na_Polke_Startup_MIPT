rag_query_task:
  description: >
    Based on the product information from barcode parser: {product_info}, formulate intelligent queries to the RAG knowledge base.
    Extract relevant information about the product, its properties, ingredients, usage recommendations, or any other relevant details.
    Use the RAG Query Tool to search the knowledge base. When calling the tool, provide a JSON string with:
    - "query": your question based on the product information
    - "collection_id": "{collection_id}"
    - "system_prompt": "{system_prompt}"
    Example: {{"query": "What are the ingredients and properties of this product?", "collection_id": "{collection_id}", "system_prompt": "{system_prompt}"}}
    Provide comprehensive answers based on the retrieved information.
  expected_output: >
    A detailed response from the RAG system containing relevant information about the product based on the knowledge base.
  agent: rag_consultant