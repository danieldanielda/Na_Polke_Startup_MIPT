recommendation_task:
  description: >
    The user has requested a product recommendation with the following query: {user_query}.

    1. Analyze the query to extract key parameters:
       - Skin Type (e.g., dry, oily, sensitive)
       - Concern/Goal (e.g., hydration, acne, anti-aging)
       - Product Type preference (if any)

    2. Use the RAG Query Tool to search for products. 
       Formulate precise queries using metadata like 'тип кожи', 'тип продукта'.

    3. Select the top 3-5 most relevant products.

    4. Present the recommendations in a structured, friendly format in Russian.

    ВАЖНО: Для каждой рекомендации ОБЯЗАТЕЛЬНО укажи все артикулы товара которые есть в формате `[article: 19000XXXXX, 19000XXXXX ... ]` сразу после названия.
    Пример вывода:
    🌟 Рекомендация 1: [Название товара из RAG] [article: 19000XXXXX]
    💧 Почему подходит: [Объяснение на основе свойств товара]
    ✨ Ключевой актив: [Активный ингредиент]

    ⚠️  КРИТИЧЕСКИ ВАЖНО:
    - Используй ТОЛЬКО артикулы, полученные из RAG Query Tool или базы знаний.
    - НЕ копируй артикулы из примеров вывода.
    - НЕ генерируй артикулы по шаблону — каждый артикул должен существовать в базе.
    - Если артикул не найден — не добавляй его в ответ.
  expected_output: >
    Список из 3-5 рекомендаций в указанном формате.
    Каждая рекомендация ОБЯЗАТЕЛЬНО должна содержать артикул в формате [article: 19XXXXXXXXX],
    взятый из метаданных товара в контексте.
    Если артикул недоступен — укажи только название, но не генерируй вымышленный номер.
  agent: recommendation_agent